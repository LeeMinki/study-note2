model = "gpt-5.4"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[mcp_servers.github]
url = "https://api.githubcopilot.com/mcp/"
bearer_token_env_var = "STUDY_NOTE_GITHUB_TOKEN"

[mcp_servers.jira]
url = "https://mcp.atlassian.com/v1/mcp"
env_http_headers = { Authorization = "STUDY_NOTE_JIRA_AUTH_HEADER" }
