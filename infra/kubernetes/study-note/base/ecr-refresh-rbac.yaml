apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-refresher
  namespace: study-note
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-refresher
  namespace: study-note
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-refresher
  namespace: study-note
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ecr-refresher
subjects:
  - kind: ServiceAccount
    name: ecr-refresher
    namespace: study-note
