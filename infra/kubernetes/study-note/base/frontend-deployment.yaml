apiVersion: apps/v1
kind: Deployment
metadata:
  name: study-note-frontend
  namespace: study-note
spec:
  replicas: 1
  selector:
    matchLabels:
      app: study-note-frontend
  template:
    metadata:
      labels:
        app: study-note-frontend
    spec:
      containers:
        - name: frontend
          image: 000000000000.dkr.ecr.ap-northeast-2.amazonaws.com/study-note-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 30
