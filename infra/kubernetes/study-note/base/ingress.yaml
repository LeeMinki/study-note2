apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: study-note
  namespace: study-note
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: study-note-backend
                port:
                  number: 3001
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: study-note-backend
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: study-note-frontend
                port:
                  number: 80
