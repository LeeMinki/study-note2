apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: study-note
  namespace: study-note
  annotations:
    # cert-manager가 이 어노테이션을 읽어 Certificate CRD와 Secret을 자동 생성/갱신한다
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # 도메인 HTTP 요청은 HTTPS로 전환한다
    traefik.ingress.kubernetes.io/router.middlewares: study-note-https-redirect@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - DOMAIN_PLACEHOLDER
        - www.DOMAIN_PLACEHOLDER
      secretName: study-note-tls-secret
  rules:
    - host: DOMAIN_PLACEHOLDER
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: study-note-backend
                port:
                  number: 3001
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: study-note-backend
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: study-note-frontend
                port:
                  number: 80
