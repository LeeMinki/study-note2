apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: study-note-www
  namespace: study-note
  annotations:
    # www → root 리디렉션 Middleware 적용
    traefik.ingress.kubernetes.io/router.middlewares: study-note-https-redirect@kubernetescrd,study-note-www-redirect@kubernetescrd
spec:
  ingressClassName: traefik
  tls:
    - hosts:
        - www.DOMAIN_PLACEHOLDER
      secretName: study-note-tls-secret
  rules:
    - host: www.DOMAIN_PLACEHOLDER
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: study-note-frontend
                port:
                  number: 80
