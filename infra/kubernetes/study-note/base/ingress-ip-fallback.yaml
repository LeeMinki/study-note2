apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: study-note-ip-fallback
  namespace: study-note
spec:
  ingressClassName: traefik
  rules:
    # DNS 또는 인증서 장애 시 공인 IP HTTP 접속을 유지하는 우회 경로다.
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: study-note-backend
                port:
                  number: 3001
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: study-note-backend
                port:
                  number: 3001
          - path: /
            pathType: Prefix
            backend:
              service:
                name: study-note-frontend
                port:
                  number: 80
