openapi: 3.0.3
info:
  title: Study Note API
  version: 1.0.0
  description: REST API contract for the Study Note monorepo backend.
servers:
  - url: http://localhost:3001
paths:
  /api/notes:
    get:
      summary: List notes
      parameters:
        - in: query
          name: search
          schema:
            type: string
          description: Search text applied to note title and content.
        - in: query
          name: tag
          schema:
            type: string
          description: Normalized tag filter. Can be used together with search.
      responses:
        '200':
          description: Notes returned successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotesListResponse'
    post:
      summary: Create a note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNoteRequest'
      responses:
        '201':
          description: Note created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteResponse'
        '400':
          description: Validation failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/notes/{noteId}:
    patch:
      summary: Update a note
      parameters:
        - in: path
          name: noteId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateNoteRequest'
      responses:
        '200':
          description: Note updated successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NoteResponse'
        '404':
          description: Note not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete a note
      parameters:
        - in: path
          name: noteId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Note deleted successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteNoteResponse'
        '404':
          description: Note not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    ApiEnvelope:
      type: object
      required: [success, data, error]
      properties:
        success:
          type: boolean
        data:
          nullable: true
        error:
          type: string
          nullable: true
    Note:
      type: object
      required: [id, title, content, tags, createdAt, updatedAt]
      properties:
        id:
          type: string
        title:
          type: string
        content:
          type: string
        tags:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateNoteRequest:
      type: object
      required: [title, content, tags]
      properties:
        title:
          type: string
        content:
          type: string
        tags:
          description: Comma-separated tag input from frontend.
          oneOf:
            - type: string
            - type: array
              items:
                type: string
    UpdateNoteRequest:
      type: object
      required: [title, content, tags]
      properties:
        title:
          type: string
        content:
          type: string
        tags:
          oneOf:
            - type: string
            - type: array
              items:
                type: string
    NoteResponse:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/Note'
    NotesListResponse:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Note'
    DeleteNoteResponse:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            data:
              type: object
              required: [id]
              properties:
                id:
                  type: string
    ErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ApiEnvelope'
        - type: object
          properties:
            success:
              type: boolean
              enum: [false]
            data:
              nullable: true
            error:
              type: string
